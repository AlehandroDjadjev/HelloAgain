services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: helloagain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: helloagain
      POSTGRES_USER: helloagain
      POSTGRES_PASSWORD: helloagain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helloagain -d helloagain"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
