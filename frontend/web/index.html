<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>frontend</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script>
    (async function () {
      function parseEnvValue(raw) {
        const trimmed = raw.trim();
        if (
          (trimmed.startsWith('"') && trimmed.endsWith('"')) ||
          (trimmed.startsWith("'") && trimmed.endsWith("'"))
        ) {
          return trimmed.slice(1, -1);
        }
        return trimmed;
      }

      function getEnvValue(envText, key) {
        const lines = envText.split(/\r?\n/);
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith('#')) continue;
          const idx = trimmed.indexOf('=');
          if (idx <= 0) continue;
          const k = trimmed.slice(0, idx).trim();
          if (k === key) {
            return parseEnvValue(trimmed.slice(idx + 1));
          }
        }
        return '';
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      try {
        const envResp = await fetch('assets/.env', { cache: 'no-store' });
        const envText = envResp.ok ? await envResp.text() : '';
        const apiKey = getEnvValue(envText, 'MAPS_API_KEY');

        if (apiKey) {
          await loadScript(
            `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(apiKey)}`
          );
        } else {
          console.warn('MAPS_API_KEY not found in assets/.env');
        }
      } catch (e) {
        console.warn('Failed to load Google Maps API from env:', e);
      }

      await loadScript('flutter_bootstrap.js');
    })();
  </script>
</body>

</html>
