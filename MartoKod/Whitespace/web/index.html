<!DOCTYPE html>
<html>
<head>
  <!--

    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="whitespace">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>whitespace</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    window.helloAgainVoice = (() => {
      let activeRecognition = null;
      let activeAudio = null;

      function getRecognitionConstructor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;
      }

      function isSpeechCaptureSupported() {
        return !!getRecognitionConstructor();
      }

      function stopRecognition() {
        if (!activeRecognition) {
          return;
        }
        try {
          activeRecognition.abort();
        } catch (_) {}
        activeRecognition = null;
      }

      function captureSpeechTurn(language) {
        return new Promise((resolve, reject) => {
          if (!isSpeechCaptureSupported()) {
            reject(new Error('Speech recognition is not supported in this browser.'));
            return;
          }

          stopRecognition();
          const Recognition = getRecognitionConstructor();
          const recognition = new Recognition();
          activeRecognition = recognition;
          recognition.lang = language || 'bg-BG';
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.maxAlternatives = 1;

          let done = false;
          let transcript = '';
          let silenceTimer = null;
          let startupTimer = null;

          const cleanup = () => {
            if (silenceTimer !== null) {
              clearTimeout(silenceTimer);
              silenceTimer = null;
            }
            if (startupTimer !== null) {
              clearTimeout(startupTimer);
              startupTimer = null;
            }
            if (activeRecognition === recognition) {
              activeRecognition = null;
            }
          };

          const fail = (message) => {
            if (done) {
              return;
            }
            done = true;
            cleanup();
            reject(new Error(message));
          };

          const finish = () => {
            if (done) {
              return;
            }
            const finalTranscript = transcript.trim();
            if (!finalTranscript) {
              fail('No speech was captured.');
              return;
            }
            done = true;
            cleanup();
            resolve(finalTranscript);
          };

          const armSilenceTimer = () => {
            if (silenceTimer !== null) {
              clearTimeout(silenceTimer);
            }
            silenceTimer = setTimeout(() => {
              try {
                recognition.stop();
              } catch (_) {
                finish();
              }
            }, 900);
          };

          recognition.onresult = (event) => {
            let latest = '';
            for (let index = 0; index < event.results.length; index += 1) {
              const result = event.results[index];
              if (!result || !result[0]) {
                continue;
              }
              const piece = (result[0].transcript || '').trim();
              if (!piece) {
                continue;
              }
              latest = piece;
            }
            if (!latest) {
              return;
            }
            transcript = latest;
            armSilenceTimer();
          };

          recognition.onerror = (event) => {
            fail(event.error || 'Speech recognition failed.');
          };

          recognition.onend = () => {
            if (done) {
              return;
            }
            finish();
          };

          startupTimer = setTimeout(() => {
            if (!transcript.trim()) {
              try {
                recognition.stop();
              } catch (_) {
                fail('No speech was captured.');
              }
            }
          }, 10000);

          try {
            recognition.start();
          } catch (error) {
            fail(error && error.message ? error.message : 'Microphone access failed.');
          }
        });
      }

      function playBase64Audio(base64Audio, mimeType) {
        return new Promise((resolve, reject) => {
          if (!base64Audio) {
            resolve();
            return;
          }

          if (activeAudio) {
            try {
              activeAudio.pause();
              activeAudio.currentTime = 0;
            } catch (_) {}
          }

          const audio = new Audio(`data:${mimeType || 'audio/wav'};base64,${base64Audio}`);
          activeAudio = audio;

          const cleanup = () => {
            if (activeAudio === audio) {
              activeAudio = null;
            }
          };

          audio.onended = () => {
            cleanup();
            resolve();
          };

          audio.onerror = () => {
            cleanup();
            reject(new Error('Audio playback failed.'));
          };

          const playPromise = audio.play();
          if (playPromise && typeof playPromise.then === 'function') {
            playPromise.catch((error) => {
              cleanup();
              reject(error);
            });
          }
        });
      }

      function stopAudio() {
        if (!activeAudio) {
          return;
        }
        try {
          activeAudio.pause();
          activeAudio.currentTime = 0;
        } catch (_) {}
        activeAudio = null;
      }

      return {
        isSpeechCaptureSupported,
        captureSpeechTurn,
        stopRecognition,
        playBase64Audio,
        stopAudio,
      };
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
